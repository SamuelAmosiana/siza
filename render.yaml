services:
  # The SIZA Web Application
  - type: web
    name: siza-app
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && npm install && npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false # You will need to set this manually in Render Dashboard for security
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: siza-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: siza-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: siza-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: siza-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: siza-db
          property: password

databases:
  # The PostgreSQL Database
  - name: siza-db
    plan: free
    databaseName: siza_db
    user: siza_user
